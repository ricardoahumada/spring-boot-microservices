apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-service-deployment
  labels:
    app: orders-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-service
  template:
    metadata:
      labels:
        app: orders-service
    spec:
      containers:
      - name: orders-service-deployment
        image: ricardoahumada/orders-service:0.0.3-SNAPSHOT
        ports:
        - name: http-orders
          containerPort: 9100