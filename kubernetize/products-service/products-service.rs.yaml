apiVersion: apps/v1
kind: Deployment
metadata:
  name: products-service-dep
  labels:
    app: products-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: products-service
  template:
    metadata:
      labels:
        app: products-service
    spec:
      containers:
      - name: products-service-dep
        image: ricardoahumada/products-service:0.0.2-SNAPSHOT
        ports:
        - name: http-prods
          containerPort: 9090