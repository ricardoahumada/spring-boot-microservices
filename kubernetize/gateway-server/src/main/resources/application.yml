server.port: 8765

spring:
  application.name: gateway-server
  cloud:
    gateway:
      discovery.locator.enabled: true
      routes:
        - id: ProductsService
          uri: "lb://products-service:9090/"
          predicates:
            - Path=/products/**
        - id: OrdersService
          uri: "lb://orders-service:9100/"
          predicates:
            - Path=/orders/**        

management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: gateway