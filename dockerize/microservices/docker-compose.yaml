version: '3.8'
services:
  naming-server:
    image: ricardoahumada/naming-server:0.0.1-SNAPSHOT
    build: naming-server/
    ports:
      - 8761:8761
  products-service:
    build: products-service/
    image: ricardoahumada/products-service:0.0.1-SNAPSHOT
    depends_on:
      - naming-server
    environment:
      SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://eureka-server:8761/eureka"}}}}'
    ports:
      - 9090:9090      
  orders-service:
    image: ricardoahumada/orders-service:0.0.1-SNAPSHOT
    build: orders-service/
    depends_on:
      - naming-server
      - products-service
    environment:
      SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://eureka-server:8761/eureka"}}}}'
    ports:
      - 9100:9100