server.port: 8765

spring:
  application.name: gateway-server
  cloud:
    gateway:
      discovery.locator.enabled: true
#      routes:
#        - id: ProductsService
#          uri: "lb://products-service/"
#          predicates:
#            - Path=/products/**
#          filters:
#            - AddRequestHeader=added-request-header, added-request-header-value
#            - AddResponseHeader=added-response-header, added-response-header-value
#        - id: OrdersService
#          uri: "lb://orders-service/"
#          predicates:
#            - Path=/orders/**
  security:
    oauth2:
      client:
        registration:
          products-client-oidc:
            provider: spring
            client-id: client1
            client-secret: myClientSecretValue
            authorization-grant-type: authorization_code
            redirect-uri: "http://127.0.0.1:8080/login/oauth2/code/{registrationId}"
            scope: openid
            client-name: products-client-oidc
          products-client-authorization-code:
            provider: spring
            client-id: client1
            client-secret: myClientSecretValue
            authorization-grant-type: authorization_code
            redirect-uri: "http://127.0.0.1:8080/authorized"
            scope: SCOPE_products.read
            client-name: products-client-authorization-code
        provider:
          spring:
            issuer-uri: http://auth-server:9000

eureka.client:
  service-url.default-zone: http://localhost:8761/eureka
  health-check.enabled: true

management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: gateway

